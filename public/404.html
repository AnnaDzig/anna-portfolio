<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirect</title>
    <script>
      // Redirect to index.html while keeping the path
      const path = window.location.pathname.replace('/anna-portfolio', '');
      const newUrl =
        '/anna-portfolio/?redirect=' +
        encodeURIComponent(
          path + window.location.search + window.location.hash,
        );

      window.location.replace(newUrl);
    </script>
  </head>
  <body></body>
</html>
